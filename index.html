<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Legends of Learning | Astro</title>
    <link rel="stylesheet" href="https://game-cdn.legendsoflearning.com/assets/lol.css" />
    <script>
      window.LOLSDK = {
        init: function() { console.log("LoL SDK Mock Initialized"); },
        gameIsReady: function() { console.log("Game is Ready"); },
        submitAnswer: function(ans) { console.log("Answer Submitted:", ans); },
        completeGame: function() { console.log("Game Completed"); },
        speakText: function(text) { console.log("Speaking:", text); },
        playSystemAudio: function(sound) { console.log("Playing Sound:", sound); },
        saveState: function(state) { console.log("State Saved:", state); },
        loadState: function(callback) { callback("{}"); }
      };
    </script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Astro.loader.js";
      var config = {
        dataUrl: buildUrl + "/Astro.data.gz",
        frameworkUrl: buildUrl + "/Astro.framework.js.gz",
        codeUrl: buildUrl + "/Astro.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Playstudio",
        productName: "Astro",
        productVersion: "1.0.0",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      } else {
        canvas.style.width = "1024px";
        canvas.style.height = "576px";
      }
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
        }).then((unityInstance) => {
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
